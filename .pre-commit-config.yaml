# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# A merge commit's content is never checked: `git merge --no-ff` fires pre-merge-commit
# (not installed), and completing a merge via `git commit` makes pre-commit narrow to
# merge-conflict files only, so a clean merge skips every file-based hook. Installing the
# pre-push hook too means the suite runs on the pushed range regardless of how the commit
# was made.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/lorenzwalthert/precommit
    rev: v0.4.3.9025
    hooks:
      # Style and format R code
      - id: style-files
        args: [--style_pkg=styler, --style_fun=tidyverse_style]

      # Update documentation
      - id: roxygenize
        additional_dependencies:
          - roxygen2

      # Keep DESCRIPTION tidy
      - id: use-tidy-description

      # Check for parsing errors
      - id: parsable-R

      # Spell check
      - id: spell-check
        args: [--lang=en-US]

      # Lint R code
      - id: lintr
        args: []
        verbose: true
        additional_dependencies:
          - cyclocomp

      # Check that README.Rmd hasn't changed without updating README.md.
      # Scope to the top-level README pair only: the hook's default pattern is
      # unanchored and wrongly fires on nested READMEs (scripts-paper/README.md,
      # tests/README.md), which have no .Rmd source.
      - id: readme-rmd-rendered
        files: '^README\.[Rr]?md$'

      # Ensure no merge conflicts markers
      - id: no-browser-statement

      # Dependencies are used (scripts-paper/ and data-raw/ are .Rbuildignore'd,
      # dev-only directories, not part of the installed package)
      - id: deps-in-desc
        exclude: '^(scripts-paper|data-raw)/'

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Remove trailing whitespace
      - id: trailing-whitespace

      # Ensure files end with newline
      - id: end-of-file-fixer

      # Check yaml files
      - id: check-yaml

      # Check for large files
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: 'inst/extdata/(feds.*\.csv|ACMTermPremium_replicated_monthly_1m_120m\.csv\.gz)$'

      # Fix mixed line endings
      - id: mixed-line-ending
        args: ['--fix=lf']

      # Check merge conflicts
      - id: check-merge-conflict

      # Check case conflict (for cross-platform)
      - id: check-case-conflict

  # Custom local hooks
  - repo: local
    hooks:
      - id: claude-reminder
        name: Remind Claude about CLAUDE.md rules
        entry: inst/hooks/claude-check.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

# Configure files to exclude
exclude: |
  (?x)^(
    \.Rproj\.user/.*|
    \.Rhistory|
    \.RData|
    \.Ruserdata/.*|
    .*\.Rproj|
    \.git/.*|
    docs/.*|
    revdep/.*|
    inst/doc/.*|
    man/.*|
    NAMESPACE|
    README\.md|
    scripts-paper/output/.*
  )$
